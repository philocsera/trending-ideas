<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trending Ideas · GitHub 트렌딩 신규 레포 아이디어</title>
<meta name="description" content="매일 GitHub Trending 신규 레포에서 영감을 받아 만들 수 있는 프로젝트·서비스 아이디어" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f4f1ea; --bg2:#fbf9f4; --ink:#1c1a17; --muted:#6b6457; --line:#e0dacd;
    --accent:#b4471f; --accent2:#1f6f5c; --chip:#ece7db; --card:#fffdf8;
    --shadow:0 1px 0 rgba(0,0,0,.03), 0 8px 24px -16px rgba(40,30,10,.30);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#15140f; --bg2:#1b1a14; --ink:#ece7d8; --muted:#9b927f; --line:#2e2b22;
    --accent:#e8794a; --accent2:#5fc3a6; --chip:#23211a; --card:#1d1b15;
    --shadow:0 1px 0 rgba(0,0,0,.2), 0 10px 30px -18px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Inter Tight",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  code,.mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
  a{color:inherit}
  .wrap{max-width:1120px; margin:0 auto; padding:0 20px}

  /* Header */
  header.top{position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid var(--line)}
  .top-inner{display:flex; align-items:center; gap:16px; padding:14px 0; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .brand b{font-weight:800; letter-spacing:-.02em; font-size:19px}
  .brand .dot{color:var(--accent)}
  .brand span{color:var(--muted); font-size:13px}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  select,button,input{font-family:inherit; font-size:14px; color:var(--ink)}
  select,.btn{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 12px; cursor:pointer}
  .btn:hover,select:hover{border-color:var(--accent)}
  .search{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 12px; min-width:180px}
  .search:focus{outline:none; border-color:var(--accent)}

  /* Hero */
  .hero{padding:34px 0 10px}
  .kicker{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:700}
  .hero h1{margin:.18em 0 .1em; font-size:clamp(28px,5vw,46px); line-height:1.05; letter-spacing:-.03em; font-weight:800}
  .hero .sub{color:var(--muted); font-size:15px; max-width:60ch}
  .stats{display:flex; gap:22px; margin-top:18px; flex-wrap:wrap}
  .stat b{font-size:26px; font-weight:800; letter-spacing:-.02em}
  .stat span{display:block; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em}
  .banner{margin-top:16px; padding:12px 16px; border:1px dashed var(--line); border-radius:12px; background:var(--bg2); color:var(--muted); font-size:14px}

  /* Grid of repo cards */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:18px; padding:22px 0 70px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 18px 16px; display:flex; flex-direction:column; gap:12px}
  .repo-head{display:flex; align-items:flex-start; gap:10px}
  .repo-rank{font-family:"JetBrains Mono"; font-size:12px; color:var(--muted); padding-top:3px; min-width:24px}
  .repo-name{font-weight:700; font-size:16px; letter-spacing:-.01em; text-decoration:none; word-break:break-word}
  .repo-name:hover{color:var(--accent); text-decoration:underline}
  .repo-name .owner{color:var(--muted); font-weight:500}
  .meta{display:flex; flex-wrap:wrap; gap:7px; align-items:center}
  .chip{font-size:12px; background:var(--chip); border-radius:999px; padding:3px 9px; color:var(--muted); white-space:nowrap}
  .chip.lang{color:var(--ink)}
  .chip.stars b{color:var(--ink)}
  .chip.today{color:#fff; background:var(--accent); font-weight:600}
  html[data-theme="dark"] .chip.today{color:#15140f}
  .desc{color:var(--ink); font-size:14px; opacity:.9}
  .desc .orig{color:var(--muted); font-size:12.5px; display:block; margin-top:3px}

  .ideas{display:flex; flex-direction:column; gap:10px; margin-top:2px}
  .ideas-label{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; display:flex; align-items:center; gap:8px}
  .ideas-label::after{content:""; flex:1; height:1px; background:var(--line)}
  .idea{border-left:2px solid var(--accent2); padding:2px 0 2px 12px}
  .idea h4{margin:0 0 4px; font-size:14.5px; font-weight:700; letter-spacing:-.01em}
  .idea p{margin:0; font-size:13px; color:var(--ink); opacity:.92}
  .idea .row{display:flex; gap:6px; flex-wrap:wrap; margin-top:7px; align-items:center}
  .idea .who{font-size:12px; color:var(--accent2); font-weight:600}
  .idea dl{margin:7px 0 0; display:grid; grid-template-columns:auto 1fr; gap:3px 8px; font-size:12.5px}
  .idea dt{color:var(--muted); white-space:nowrap}
  .idea dd{margin:0}
  .tag{font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted)}
  .tag.diff-쉬움{color:var(--accent2); border-color:var(--accent2)}
  .tag.diff-보통{color:var(--accent)}
  .tag.diff-어려움{color:#b4471f; border-color:var(--accent)}

  footer{border-top:1px solid var(--line); padding:26px 0 50px; color:var(--muted); font-size:13px}
  footer a{color:var(--accent)}
  .empty{padding:60px 0; text-align:center; color:var(--muted)}
  .hide{display:none !important}
  @media (max-width:560px){ .grid{grid-template-columns:1fr} .hero{padding-top:24px} }
</style>
</head>
<body>
<header class="top">
  <div class="wrap top-inner">
    <div class="brand"><b>Trending<span class="dot">·</span>Ideas</b><span>GitHub 신규 레포 → 만들 거리</span></div>
    <div class="controls">
      <input id="search" class="search" type="search" placeholder="레포·아이디어 검색…" aria-label="검색" />
      <select id="dateSel" aria-label="날짜 선택"></select>
      <button id="theme" class="btn" title="테마 전환" aria-label="테마 전환">◐</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <div class="kicker" id="kicker">DAILY GITHUB TRENDING</div>
    <h1 id="title">불러오는 중…</h1>
    <div class="sub" id="subtitle">어제 트렌딩에는 없던 신규 레포에서 영감을 받아 만들 수 있는 프로젝트·서비스 아이디어.</div>
    <div class="stats" id="stats"></div>
    <div class="banner hide" id="banner"></div>
  </section>
  <section class="grid" id="grid"></section>
  <div class="empty hide" id="empty"></div>
</main>

<footer class="wrap">
  매일 자동 생성 · 외부 LLM API 미사용(스킬 인라인 생성) ·
  데이터: <a href="./data/latest.json">latest.json</a> ·
  소스: <a href="https://github.com/trending" target="_blank" rel="noopener">github.com/trending</a>
</footer>

<script>
const $ = (s)=>document.querySelector(s);
const esc = (s)=> (s==null?"":String(s)).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtNum = (n)=> (n==null||isNaN(n))?"":Number(n).toLocaleString("en-US");

// theme
const root=document.documentElement;
const savedTheme=localStorage.getItem("ti-theme");
if(savedTheme) root.setAttribute("data-theme",savedTheme);
else if(matchMedia("(prefers-color-scheme: dark)").matches) root.setAttribute("data-theme","dark");
$("#theme").onclick=()=>{const t=root.getAttribute("data-theme")==="dark"?"light":"dark";root.setAttribute("data-theme",t);localStorage.setItem("ti-theme",t);};

let CURRENT=null;

async function loadJSON(url){ const r=await fetch(url,{cache:"no-cache"}); if(!r.ok) throw new Error(url+" "+r.status); return r.json(); }

function fmtDate(d){ try{ const [y,m,da]=d.split("-"); return `${y}.${m}.${da}`; }catch(e){ return d; } }

function ideaCard(idea){
  const diff=esc(idea.difficulty||"");
  const rows=[
    idea.why_now ? `<dt>왜 지금</dt><dd>${esc(idea.why_now)}</dd>`:"",
    idea.mvp ? `<dt>MVP</dt><dd>${esc(idea.mvp)}</dd>`:"",
    idea.monetization ? `<dt>수익화</dt><dd>${esc(idea.monetization)}</dd>`:""
  ].join("");
  return `<div class="idea">
    <h4>${esc(idea.title||"")}</h4>
    <p>${esc(idea.what||"")}</p>
    <div class="row">
      ${idea.target_user?`<span class="who">▸ ${esc(idea.target_user)}</span>`:""}
      ${diff?`<span class="tag diff-${diff}">${diff}</span>`:""}
    </div>
    ${rows?`<dl>${rows}</dl>`:""}
  </div>`;
}

function repoCard(r){
  const [owner,name] = (r.name||"/").split("/");
  const meta=[
    r.language?`<span class="chip lang">${esc(r.language)}</span>`:"",
    (r.stars!=null)?`<span class="chip stars">★ <b>${fmtNum(r.stars)}</b></span>`:"",
    (r.stars_today!=null)?`<span class="chip today">+${fmtNum(r.stars_today)} today</span>`:""
  ].join("");
  const ideas=(r.ideas||[]).map(ideaCard).join("");
  return `<article class="card" data-text="${esc((r.name+' '+(r.description||'')+' '+(r.description_ko||'')+' '+(r.ideas||[]).map(i=>i.title+' '+i.what+' '+i.target_user).join(' ')).toLowerCase())}">
    <div class="repo-head">
      <div class="repo-rank">${r.rank!=null?String(r.rank).padStart(2,"0"):"–"}</div>
      <a class="repo-name" href="${esc(r.url||'#')}" target="_blank" rel="noopener"><span class="owner">${esc(owner)}/</span>${esc(name||"")}</a>
    </div>
    <div class="meta">${meta}</div>
    ${(r.description_ko||r.description)?`<div class="desc">${esc(r.description_ko||r.description)}${r.description_ko&&r.description?`<span class="orig">${esc(r.description)}</span>`:""}</div>`:""}
    ${ideas?`<div class="ideas"><div class="ideas-label">만들 수 있는 것 · ${(r.ideas||[]).length}</div>${ideas}</div>`:""}
  </article>`;
}

function render(day){
  CURRENT=day;
  const repos=day.new_repos||[];
  $("#title").textContent = day.is_baseline ? `${fmtDate(day.date)} · 트렌딩 시드` : `${fmtDate(day.date)} 신규 트렌딩`;
  $("#subtitle").textContent = day.is_baseline
    ? "첫 스냅샷(기준선)입니다. 내일부터 ‘어제 대비 신규’만 추려서 보여줍니다."
    : "어제 트렌딩에는 없던 신규 레포에서 영감을 받아 만들 수 있는 프로젝트·서비스 아이디어.";
  $("#stats").innerHTML =
    `<div class="stat"><b>${day.trending_count??"–"}</b><span>오늘 트렌딩</span></div>`+
    `<div class="stat"><b>${repos.length}</b><span>${day.is_baseline?"시드 레포":"신규 레포"}</span></div>`+
    `<div class="stat"><b>${repos.reduce((a,r)=>a+((r.ideas||[]).length),0)}</b><span>아이디어</span></div>`;
  const banner=$("#banner");
  if(day.note){ banner.textContent=day.note; banner.classList.remove("hide"); } else banner.classList.add("hide");

  const grid=$("#grid"), empty=$("#empty");
  if(!repos.length){
    grid.innerHTML="";
    empty.textContent= day.is_baseline ? "시드 데이터가 없습니다." : "오늘은 어제 대비 신규 트렌딩 레포가 없습니다. 내일 다시 확인해 주세요.";
    empty.classList.remove("hide");
  } else {
    empty.classList.add("hide");
    grid.innerHTML=repos.map(repoCard).join("");
  }
  applyFilter();
}

function applyFilter(){
  const q=$("#search").value.trim().toLowerCase();
  let shown=0;
  document.querySelectorAll("#grid .card").forEach(c=>{
    const ok=!q || c.dataset.text.includes(q);
    c.classList.toggle("hide",!ok); if(ok) shown++;
  });
  const empty=$("#empty");
  if(q && shown===0 && (CURRENT?.new_repos||[]).length){ empty.textContent=`“${q}”에 해당하는 결과가 없습니다.`; empty.classList.remove("hide"); }
  else if(q){ empty.classList.add("hide"); }
}
$("#search").addEventListener("input", applyFilter);

async function boot(){
  let dates=[];
  try{ const idx=await loadJSON("./data/index.json"); dates=(idx.dates||[]).slice().sort().reverse(); }catch(e){}
  const sel=$("#dateSel");
  if(!dates.length){
    $("#title").textContent="아직 데이터가 없습니다";
    $("#subtitle").textContent="스킬을 한 번 실행하면 이곳에 매일의 신규 트렌딩 아이디어가 쌓입니다.";
    $("#stats").innerHTML=""; sel.classList.add("hide"); return;
  }
  sel.innerHTML=dates.map(d=>`<option value="${d}">${fmtDate(d)}</option>`).join("");
  sel.onchange=async()=>{ try{ render(await loadJSON(`./data/${sel.value}.json`)); }catch(e){ $("#empty").textContent="데이터를 불러오지 못했습니다."; $("#empty").classList.remove("hide"); } };
  try{ render(await loadJSON(`./data/${dates[0]}.json`)); }
  catch(e){ try{ render(await loadJSON("./data/latest.json")); }catch(e2){ $("#empty").textContent="데이터를 불러오지 못했습니다."; $("#empty").classList.remove("hide"); } }
}
boot();
</script>
</body>
</html>
